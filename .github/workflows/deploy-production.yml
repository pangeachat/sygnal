name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # Required for OIDC

env:
  ECR_REGISTRY: 061565848348.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: pangea-prod-sygnal
  INSTANCE_ID: i-074c64998e68a5bc6
  AWS_REGION: us-east-1
  IAM_ROLE: arn:aws:iam::061565848348:role/github-deploy-prod

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.build-image.outputs.image-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.IAM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build-image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:production
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Output image tag
        run: echo "image-tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to Production EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.IAM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM
        id: ssm-command
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:production"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"bash -c 'set -euo pipefail && echo Pulling ${IMAGE} && docker pull ${IMAGE} && echo Restarting matrix-sygnal && systemctl restart matrix-sygnal && sleep 5 && systemctl is-active matrix-sygnal && echo Deploy complete'\"
            ]" \
            --timeout-seconds 300 \
            --comment "Sygnal production deploy from ${{ github.sha }}" \
            --query 'Command.CommandId' \
            --output text)
          echo "command-id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for deploy completion
        run: |
          COMMAND_ID="${{ steps.ssm-command.outputs.command-id }}"
          echo "Waiting for SSM command $COMMAND_ID ..."

          for i in $(seq 1 36); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ env.INSTANCE_ID }}" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")

            echo "  Attempt $i: $STATUS"
            if [[ "$STATUS" == "Success" ]]; then
              echo "Deploy succeeded."
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ env.INSTANCE_ID }}" \
                --query 'StandardOutputContent' \
                --output text
              exit 0
            elif [[ "$STATUS" == "Failed" || "$STATUS" == "Cancelled" || "$STATUS" == "TimedOut" ]]; then
              echo "Deploy failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ env.INSTANCE_ID }}" \
                --query '[StandardOutputContent, StandardErrorContent]' \
                --output text
              exit 1
            fi
            sleep 5
          done
          echo "Timed out waiting for SSM command."
          exit 1

  notify:
    name: Post Deploy Notification
    needs: deploy
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Extract Summary and To Test sections
        id: parse
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
          SERVICE_NAME: "Sygnal"
          VERSION: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          python3 << 'PYEOF'
          import html, os, re

          body = os.environ.get("RELEASE_BODY", "")
          service = os.environ["SERVICE_NAME"]
          version = os.environ["VERSION"]

          def extract_section(text, heading):
              pattern = rf"^## {re.escape(heading)}\s*\n(.*?)(?=^## |\Z)"
              match = re.search(pattern, text, re.MULTILINE | re.DOTALL)
              return match.group(1).strip() if match else ""

          def md_to_html(text):
              h = html.escape(text)
              h = re.sub(r'\*\*(.+?)\*\*', r'<strong>\1</strong>', h)
              def replace_ol(m):
                  items = re.findall(r'^\d+\.\s+(.+)$', m.group(0), re.MULTILINE)
                  li = "".join(f'<li class="org.matrix.taskitem"><input type="checkbox" disabled /> {i}</li>' for i in items)
                  return f'<ul class="org.matrix.tasklist">{li}</ul>'
              h = re.sub(r'(?:^\d+\.\s+.+$\n?)+', replace_ol, h, flags=re.MULTILINE)
              def replace_ul(m):
                  items = re.findall(r'^[-*]\s+(.+)$', m.group(0), re.MULTILINE)
                  li = "".join(f"<li>{i}</li>" for i in items)
                  return f"<ul>{li}</ul>"
              h = re.sub(r'(?:^[-*]\s+.+$\n?)+', replace_ul, h, flags=re.MULTILINE)
              h = h.replace("\n\n", "<br/><br/>")
              h = h.replace("\n", "<br/>")
              return h

          summary = extract_section(body, "Summary")
          to_test = extract_section(body, "To Test")

          plain = f"\U0001f680 **{service} {version}** deployed to production"
          if summary:
              plain += f"\n\n**Summary**\n{summary}"
          if to_test:
              to_test_plain = re.sub(r'^\d+\.\s+', '- [ ] ', to_test, flags=re.MULTILINE)
              plain += f"\n\n**To Test**\n{to_test_plain}"

          h = f"\U0001f680 <strong>{html.escape(service)} {html.escape(version)}</strong> deployed to production"
          if summary:
              h += f"<br/><br/><strong>Summary</strong><br/>{md_to_html(summary)}"
          if to_test:
              h += f"<br/><br/><strong>To Test</strong><br/>{md_to_html(to_test)}"

          with open("/tmp/matrix_message.txt", "w") as f:
              f.write(plain)
          with open("/tmp/matrix_message.html", "w") as f:
              f.write(h)
          PYEOF

      - name: Login to Matrix
        id: login
        env:
          MATRIX_PASSWORD: ${{ secrets.SYSTEM_STATUS_BOT_MATRIX_PASS }}
        shell: bash
        run: |
          RESPONSE=$(curl -s -X POST "https://matrix-client.matrix.org/_matrix/client/v3/login" \
            -H "Content-Type: application/json" \
            -d "$(python3 -c "import json,os; print(json.dumps({'type':'m.login.password','identifier':{'type':'m.id.user','user':'pangea-chat-system-status'},'password':os.environ['MATRIX_PASSWORD']}))")")
          TOKEN=$(echo "$RESPONSE" | jq -r '.access_token // empty')
          if [ -z "$TOKEN" ]; then
            echo "::error::Matrix login failed: $RESPONSE"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Post to Matrix room
        shell: bash
        run: |
          python3 -c "
          import json
          plain = open('/tmp/matrix_message.txt').read().strip()
          html_body = open('/tmp/matrix_message.html').read().strip()
          payload = {
              'msgtype': 'm.text',
              'body': plain,
              'format': 'org.matrix.custom.html',
              'formatted_body': html_body
          }
          with open('/tmp/matrix_payload.json', 'w') as f:
              json.dump(payload, f)
          "
          TXN_ID="deploy-$(date +%s%N)"
          HTTP_CODE=$(curl -s -o /tmp/matrix_response.txt -w "%{http_code}" \
            -X PUT "https://matrix-client.matrix.org/_matrix/client/v3/rooms/!xTFdZkhXDDCInLhgqs:matrix.org/send/m.room.message/$TXN_ID" \
            -H "Authorization: Bearer ${{ steps.login.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d @/tmp/matrix_payload.json)
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Message posted to Matrix room (HTTP $HTTP_CODE)"
          else
            echo "::error::Failed to post to Matrix (HTTP $HTTP_CODE): $(cat /tmp/matrix_response.txt)"
            exit 1
          fi

      - name: Logout
        if: always() && steps.login.outputs.token
        shell: bash
        run: |
          curl -s -X POST "https://matrix-client.matrix.org/_matrix/client/v3/logout" \
            -H "Authorization: Bearer ${{ steps.login.outputs.token }}" || true
