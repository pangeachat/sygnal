name: Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # Required for OIDC

env:
  ECR_REGISTRY: 061565848348.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: pangea-staging-sygnal
  INSTANCE_ID: i-028b5c19a329c8961
  AWS_REGION: us-east-1
  IAM_ROLE: arn:aws:iam::061565848348:role/github-deploy-staging

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.build-image.outputs.image-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ env.IAM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push
        id: build-image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:main
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Output image tag
        run: echo "image-tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to Staging EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ env.IAM_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM
        id: ssm-command
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:main"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"bash -c 'set -euo pipefail && echo Pulling ${IMAGE} && docker pull ${IMAGE} && echo Restarting matrix-sygnal && systemctl restart matrix-sygnal && sleep 5 && systemctl is-active matrix-sygnal && echo Deploy complete'\"
            ]" \
            --timeout-seconds 300 \
            --comment "Sygnal staging deploy from ${{ github.sha }}" \
            --query 'Command.CommandId' \
            --output text)
          echo "command-id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for deploy completion
        run: |
          COMMAND_ID="${{ steps.ssm-command.outputs.command-id }}"
          echo "Waiting for SSM command $COMMAND_ID ..."

          for i in $(seq 1 36); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ env.INSTANCE_ID }}" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")

            echo "  Attempt $i: $STATUS"
            if [[ "$STATUS" == "Success" ]]; then
              echo "Deploy succeeded."
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ env.INSTANCE_ID }}" \
                --query 'StandardOutputContent' \
                --output text
              exit 0
            elif [[ "$STATUS" == "Failed" || "$STATUS" == "Cancelled" || "$STATUS" == "TimedOut" ]]; then
              echo "Deploy failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ env.INSTANCE_ID }}" \
                --query '[StandardOutputContent, StandardErrorContent]' \
                --output text
              exit 1
            fi
            sleep 5
          done
          echo "Timed out waiting for SSM command."
          exit 1
