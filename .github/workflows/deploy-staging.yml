name: Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write  # Required for OIDC

env:
  GHCR_IMAGE: ghcr.io/pangeachat/sygnal
  INSTANCE_ID: i-028b5c19a329c8961
  AWS_REGION: us-east-1

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=main
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

  deploy:
    name: Deploy to Staging EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::061565848348:role/github-deploy-staging
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM
        id: ssm-command
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "set -euo pipefail",
              "echo \"Pulling ${{ env.GHCR_IMAGE }}:main ...\"",
              "docker pull ${{ env.GHCR_IMAGE }}:main",
              "echo \"Restarting matrix-sygnal ...\"",
              "systemctl restart matrix-sygnal",
              "sleep 5",
              "echo \"Service status:\"",
              "systemctl is-active matrix-sygnal",
              "echo \"Deploy complete.\""
            ]' \
            --timeout-seconds 120 \
            --comment "Sygnal staging deploy from ${{ github.sha }}" \
            --query 'Command.CommandId' \
            --output text)
          echo "command-id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for deploy completion
        run: |
          COMMAND_ID="${{ steps.ssm-command.outputs.command-id }}"
          echo "Waiting for SSM command $COMMAND_ID ..."

          for i in $(seq 1 24); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ env.INSTANCE_ID }}" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")

            echo "  Attempt $i: $STATUS"
            if [[ "$STATUS" == "Success" ]]; then
              echo "Deploy succeeded."
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ env.INSTANCE_ID }}" \
                --query 'StandardOutputContent' \
                --output text
              exit 0
            elif [[ "$STATUS" == "Failed" || "$STATUS" == "Cancelled" || "$STATUS" == "TimedOut" ]]; then
              echo "Deploy failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ env.INSTANCE_ID }}" \
                --query '[StandardOutputContent, StandardErrorContent]' \
                --output text
              exit 1
            fi
            sleep 5
          done
          echo "Timed out waiting for SSM command."
          exit 1
