name: Add needs testing labels
on:
  issues:
    types:
      - closed
jobs:
  label_issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Add testing labels (unless opted out)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.issue.number }}
        run: |
          BODY=$(gh issue view "$NUMBER" --json body -q .body)
          if echo "$BODY" | grep -qi "no client testing needed"; then
            echo "Issue opts out of client testing — skipping label."
            exit 0
          fi
          gh issue edit "$NUMBER" --add-label "needs iOS testing"
          gh issue edit "$NUMBER" --add-label "needs android testing"
